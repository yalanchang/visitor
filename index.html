<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RhinoShield Visitor Check-in</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap"
    rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100dvh;
      background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('./image/circular-blue.webp');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    .lang-dropdown {
      position: fixed;
      top: calc(20px + env(safe-area-inset-top));
      right: 16px;
      z-index: 1000;
      padding-bottom: 8px;
      cursor: pointer !important;
    }

    .lang-dropbtn {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(5px);
      color: white;
      -webkit-backdrop-filter: blur(10px);
      /* Safari */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 50px;
      transition: all 0.3s ease;
      width: 80px;
      height: 40px;
      cursor: pointer !important;
      border: none !important;
      outline: none;


    }

    .lang-dropbtn:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    .lang-dropdown-content {
      visibility: hidden;
      position: absolute;
      top: 40px;
      right: 0;
      background-color: white;
      width: 80px;
      box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
      border-radius: 12px;
      margin-top: 4px;
      overflow: hidden;
      animation: fadeInUp 0.3s ease-out;
      cursor: pointer;
      opacity: 0;
      z-index: 1001;
    }

    .lang-dropdown-content div {
      color: black;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
      cursor: pointer;
      text-align: center;
      font-size: 14px;
      transition: background 0.2s;
    }

    .lang-dropdown-content div:hover {
      background-color: #f1f1f1;
    }

    .lang-dropdown-content.show {
      visibility: visible;
      opacity: 1;
      transform: translateY(0);
    }

    .lang-dropdown::after {
      content: "";
      position: absolute;
      top: 40px;
      right: 0;
      width: 100%;
      height: 15px;
    }



    .lang-dropdown-content div:hover {
      background-color: #f1f1f1;
      cursor: pointer !important;
    }


    .card {
      width: 100%;
      max-width: 1080px;
      min-height: 600px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .screen {
      display: none !important;
      height: 100%;
      flex-direction: column;
    }

    .screen.active {
      display: flex !important;
    }

    #s1 {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
      height: 80dvh;
      text-align: center;
      padding-bottom: 12px;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .s1-top {
      animation: fadeInUp 1s ease-out forwards;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-bottom: 8vh;
    }

    .logo-box {
      width: 64px;
      height: 64px;
      background-color: #efefef;
      -webkit-mask: url(./image/rhinoshield-only-logo.svg) no-repeat center;
      mask: url(./image/rhinoshield-only-logo.svg) no-repeat center;
      -webkit-mask-size: contain;
      mask-size: contain;
      margin: 0 auto 1.5rem;
    }

    .s1-top h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 106px;
      color: #efefef;
      line-height: 1.1;
      word-break: break-word;
    }

    .s2-header .logo-box {
      filter: invert(1);
    }


    .footer {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: auto;
    }

    .enter-btn {
      width: 160px;
      background: #ccc;
      color: #0a0a0a;
      font-size: 18px;
      font-weight: 600;
      border: none;
      padding: 16px;
      cursor: pointer;
      border-radius: 50px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .enter-btn:hover {
      background: #fff;
    }

    #s2,
    #s3 {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px);
      border-radius: 20px;
      height: auto;
    }

    #s2 {
      max-height: none;
      overflow: visible;
    }

    #s3 {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(10px);
    }

    .s2-header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .s2-body {
      padding: 2rem;
      overflow-y: visible;
      display: block;
    }

    .back-btn {
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
      color: rgba(255, 255, 255, 0.8);
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }


    .field {
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      width: 100%;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .field input,
    .field textarea {
      width: 100%;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      outline: none;
      word-break: break-all;
    }

    .field input:focus {
      border-color: #000;
    }

    .submit-btn {
      width: 100%;
      background: #ccc;
      color: #000;
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;

    }

    #s-photo .s2-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    #video {
      width: 100%;
      max-width: 640px;
      max-height: 40vh;
      border-radius: 20px;
      background: #000;
      object-fit: cover;
    }

    .submit-btn:hover {
      background-color: #fff;

    }

    .s3-body {
      padding: 3rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .success-icon-wrap {
      width: 80px;
      height: 80px;
      background: #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .success-icon {
      color: #fff;
      font-size: 40px;
      font-weight: bold;
    }

    .success-title {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: #000;
      margin-bottom: 1rem;
    }

    .photo-result-container {
      width: 180px;
      height: 180px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      margin: 1.5rem 0;
    }

    #photo-result {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .success-desc {
      color: #666;
      font-size: 12px;
      max-width: 240px;
      line-height: 1.5;
      margin-bottom: 2rem;
    }

    .done-btn {
      background: none;
      border: 1px solid #ccc;
      padding: 10px 30px;
      border-radius: 50px;
      color: #888;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .done-btn:hover {
      background: #000;
      color: #fff;
      border-color: #000;
    }

    .field select {
      width: 100%;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 14px;
      font-size: 16px;
      outline: none;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 14px center;
      background-size: 16px;
    }


    @keyframes scaleIn {
      from {
        transform: scale(0);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @media (max-width: 1024px) {
      .s1-top h1 {
        font-size: 80px;
        padding-bottom: 0;
      }
    }

    @media (max-width: 768px) {
      .card {
        height: 80dvh;
        min-height: auto;
        justify-content: flex-start !important;
        flex-direction: column;
        display: flex;
      }


      .s1-top h1 {
        font-size: 56px;
        padding: 0 12px;
      }

      .logo-box {
        width: 48px;
        height: 48px;

      }

      #s2 {
        position: relative;
        z-index: 10;
        margin-top: 0;
      }

      .s2-header {
        padding: 1.2rem;
      }

      .s2-header h2 {
        white-space: nowrap;
      }

      .s2-body {
        overflow-y: auto;
        padding: 1rem 1.5rem;
        -webkit-overflow-scrolling: touch;
        
      }
      

      .enter-btn {
        width: 140px;
        padding: 14px;
        font-size: 16px;
      }

      .screen.active {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      #video {
        max-height: 35vh;
      }
      

      .lang-dropdown {
        top: calc(15px + env(safe-area-inset-top));
      }

      .lang-dropbtn {
        width: 68px;
        height: 36px;
        font-size: 12px;
      }

      .lang-dropdown-content {
        width: 68px;

      }
   
    }


    /* iPhone SE */
    @media (max-height: 670px) {
      .s1-top h1 {
        font-size: 36px;
      }

      .logo-box {
        width: 40px;
        height: 40px;
        margin-bottom: 1rem;
      }
    }
  </style>
</head>

<body>
  <div class="lang-dropdown" onclick="toggleMenu(event)">
    <button class="lang-dropbtn" id="lang-current">繁中</button>
    <div class="lang-dropdown-content" id="lang-content">
      <div onclick="event.stopPropagation(); switchLang('zh', '繁中')">繁中</div>
      <div onclick="event.stopPropagation(); switchLang('en', 'EN')">EN</div>
      <div onclick="event.stopPropagation(); switchLang('fr', 'FR')">FR</div>
    </div>
  </div>
  <div class="card">
    <div class="screen active" id="s1">
      <div class="s1-top">
        <div class="logo-box"></div>
        <h1>Welcome to<br>RhinoShield</h1>
      </div>
      <div class="footer">
        <button class="enter-btn" onclick="go('s2')" data-i18n="checkin">開始登記</button>
      </div>
    </div>
    <div class="screen" id="s-photo">
      <div class="s2-body" style="text-align:center;">
        <h2 style="font-family:'DM Serif Display'; margin-bottom:20px; color:#ccc" data-i18n="take_photo">Take a Photo
        </h2>
        <video id="video" width="100%" autoplay playsinline style="border-radius:20px; background:#000;"></video>
        <canvas id="canvas" style="display:none;"></canvas>

        <button class="submit-btn" onclick="takePhoto()" data-i18n="take_submit">送出</button>
        <button class="back-btn" onclick="backToForm()" data-i18n="btn_back">
          上一步
        </button>
      </div>
    </div>
    <div class="screen" id="s2">
      <div class="s2-header">
        <div class="logo-box" style="width:32px; height:32px; margin:0; border-radius:6px; background-size: contain;">
        </div>
        <div>
          <h2 style="font-family:'DM Serif Display'; font-size:20px;" data-i18n="form_title">訪客登記表</h2>
        </div>
      </div>
      <div class="s2-body">
        <div class="field">
          <label data-i18n="label_name">姓名</label>
          <input type="text" id="f-name" autocomplete="off" />
        </div>
        <div class="field">
          <label data-i18n="label_email">信箱</label>
          <input type="email" id="f-email" autocomplete="off" />
        </div>
        <div class="field">
          <label data-i18n="label_phone">電話</label>
          <input type="tel" id="f-phone" autocomplete="off" />
        </div>
        <div class="field">
          <label data-i18n="label_purpose">來訪目的</label>
          <select id="f-purpose" onchange="checkPurpose(this.value)">
            <option value="" disabled selected data-i18n="select_placeholder">請選擇來訪目的</option>
            <option value="面試" data-i18n="opt_interview">面試</option>
            <option value="商務會議" data-i18n="opt_meeting">商務會議</option>
            <option value="廠商送貨" data-i18n="opt_delivery">廠商送貨</option>
            <option value="參訪" data-i18n="opt_visit">參訪</option>
            <option value="其他" data-i18n="opt_other">其他</option>
          </select>
        </div>
        <div class="field" id="other-purpose-wrap" style="display: none;">
          <label data-i18n="label_specific">請註明目的</label>
          <input type="text" id="f-purpose-other" autocomplete="off" />
        </div>
        <button class="submit-btn" onclick="submitForm()" data-i18n="btn_submit">下一步
        </button>
      </div>
    </div>

    <div class="screen" id="s3">
      <div class="s3-body">
        <div class="success-icon-wrap">
          <div class="success-icon">✓</div>
        </div>

        <h2 class="success-title" data-i18n="success_title">登記成功</h2>

        <div class="photo-result-container">
          <img id="photo-result" alt="Visitor Photo">
        </div>

        <p class="success-desc" data-i18n="success_desc">我們已收到您的登記，請稍候人員接待。</p>

        <button class="done-btn" onclick="location.reload()" data-i18n="btn_done">完成</button>
      </div>
    </div>
  </div>

  <script>
    const i18n = {
      zh: {
        welcome: "歡迎來到<br>RhinoShield",
        checkin: "開始登記",
        take_photo: "拍張照吧",
        take_submit: "下一步",
        form_title: "訪客登記表",
        label_name: "姓名",
        label_email: "信箱",
        label_phone: "電話",
        label_purpose: "來訪目的",
        label_specific: "請註明目的",
        select_placeholder: "請選擇來訪目的",
        opt_interview: "面試",
        opt_meeting: "商務會議",
        opt_delivery: "廠商送貨",
        opt_visit: "參訪",
        opt_other: "其他",
        btn_submit: "送出",
        success_title: "登記成功",
        success_desc: "我們已收到您的登記，請稍候人員接待。",
        btn_done: "完成",
        alert_fill: "請填寫所有欄位",
        alert_email: "請輸入正確的 Email 格式",
        alert_purpose: "請註明具體的來訪目的",
        btn_back: "返回"
      },
      en: {
        welcome: "Welcome to<br>RhinoShield",
        checkin: "Check In",
        take_photo: "Take a Photo",
        take_submit: "Take & Submit",
        form_title: "Visitor Form",
        label_name: "Full Name",
        label_email: "Email Address",
        label_phone: "Phone Number",
        label_purpose: "Purpose of Visit",
        label_specific: "Specific Purpose",
        select_placeholder: "Select purpose",
        opt_interview: "Interview",
        opt_meeting: "Business Meeting",
        opt_delivery: "Delivery",
        opt_visit: "Visit",
        opt_other: "Other",
        btn_submit: "Submit",
        success_title: "Successful",
        success_desc: "Registration received.",
        btn_done: "Done",
        alert_fill: "Please fill in all fields",
        alert_email: "Please enter a valid email",
        alert_purpose: "Please specify your purpose",
        btn_back: "Back to Edit",
      },
      fr: {
        welcome: "Bienvenue chez<br>RhinoShield",
        checkin: "Enregistrer",
        take_photo: "Prendre une photo",
        take_submit: "Prendre & Envoyer",
        form_title: "Formulaire Visiteur",
        label_name: "Nom Complet",
        label_email: "Adresse Email",
        label_phone: "Téléphone",
        label_purpose: "Motif de la visite",
        label_specific: "Précisez le motif",
        select_placeholder: "Choisissez le motif",
        opt_interview: "Entretien",
        opt_meeting: "Réunion d'affaires",
        opt_delivery: "Livraison",
        opt_visit: "Visite",
        opt_other: "Autre",
        btn_submit: "Envoyer",
        success_title: "Réussi",
        success_desc: "Enregistrement reçu. Veuillez patienter.",
        btn_done: "Terminé",
        alert_fill: "Veuillez remplir tous les champs",
        alert_email: "Veuillez entrer un email valide",
        alert_purpose: "Veuillez préciser votre motif",
        btn_back: "Retour au formulaire",
      }
    };
    function toggleMenu(event) {
      event.stopPropagation();
      const content = document.getElementById('lang-content');
      content.classList.toggle('show');
    }

    document.addEventListener('click', () => {
      document.getElementById('lang-content').classList.remove('show');
    });

    let currentLang = 'en';

    function switchLang(lang, label) {
      currentLang = lang;
      document.getElementById('lang-current').innerText = label;
      document.body.setAttribute('data-lang', lang);

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18n[lang][key]) {
          el.innerHTML = i18n[lang][key];
        }
      });
      const content = document.getElementById('lang-content');
      content.classList.remove('show');

      document.activeElement.blur();
    }
    function go(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    let stream;
    function checkPurpose(val) {
      const otherWrap = document.getElementById('other-purpose-wrap');
      if (val === '其他') {
        otherWrap.style.display = 'block';
      } else {
        otherWrap.style.display = 'none';
      }
    }
    async function submitForm() {
      const f = (id) => document.getElementById(id).value.trim();
      const emailValue = f('f-email');
      const purposeValue = f('f-purpose');
      if (!f('f-name') || !emailValue || !f('f-phone') || !purposeValue) {
        return alert(i18n[currentLang].alert_fill);
      }
      if (purposeValue === '其他' && !f('f-purpose-other')) {
        return alert(i18n[currentLang].alert_purpose);
      }
      if (!emailValue.includes('@')) {
        return alert(i18n[currentLang].alert_email); return;
      }

      go('s-photo');

      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        document.getElementById('video').srcObject = stream;
      } catch (err) {
        alert("無法開啟相機，請檢查權限");
        go('s3');
      }
    }
    function backToForm() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      go('s2');
    }

    function takePhoto() {
      try {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');


        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = canvas.toDataURL('image/png');
        const resultImg = document.getElementById('photo-result');
        if (resultImg) {
          resultImg.src = imageData;
        }
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzOEgbRyERNm80Z7r9oQ9u4Q9sh9TXaVUrV1tWsDcpwZVQRpWk5HJ7X89xuypdijRp3/exec';
        const payload = {
          name: document.getElementById('f-name').value,
          email: document.getElementById('f-email').value,
          phone: document.getElementById('f-phone').value,
          purpose: document.getElementById('f-purpose').value === '其他'
            ? document.getElementById('f-purpose-other').value
            : document.getElementById('f-purpose').value
        };

        fetch(scriptURL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'text/plain'
          },
          body: JSON.stringify(payload)
        })
          .then(() => console.log('Data sent to Google Sheets'))
          .catch(err => console.error('Error:', err));
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
          stream = null;
        }

        go('s3');
      } catch (e) {
        console.error("拍照失敗:", e);
        go('s3');
      }

    }
  </script>
</body>

</html>
