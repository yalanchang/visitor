<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RhinoShield Visitor Check-in</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div class="lang-dropdown" onclick="toggleMenu(event)">
    <button class="lang-dropbtn" id="lang-current">繁中</button>
    <div class="lang-dropdown-content" id="lang-content">
      <div onclick="event.stopPropagation(); switchLang('zh', '繁中')">繁中</div>
      <div onclick="event.stopPropagation(); switchLang('en', 'EN')">EN</div>
      <div onclick="event.stopPropagation(); switchLang('fr', 'FR')">FR</div>
    </div>
  </div>
  <div class="card">
    <div class="screen active" id="s1">
      <div class="s1-top">
        <div class="logo-box"></div>
        <h1>Welcome to<br>RhinoShield</h1>
      </div>
      <div class="footer">
        <button class="enter-btn" onclick="go('s2')" data-i18n="checkin">開始登記</button>
      </div>
    </div>
    <div class="screen" id="s-photo">
      <div class="s2-body" style="text-align:center;">
        <h2 style="font-family:'DM Serif Display'; margin-bottom:20px; color:#ccc" data-i18n="take_photo">Take a Photo
        </h2>
        <video id="video" width="100%" autoplay playsinline style="border-radius:20px; background:#000;"></video>
        <canvas id="canvas" style="display:none;"></canvas>

        <button class="submit-btn" onclick="takePhoto()" data-i18n="take_submit">送出</button>
        <button class="back-btn" onclick="backToForm()" data-i18n="btn_back">
          上一步
        </button>
      </div>
    </div>
    <div class="screen" id="s2">
      <div class="s2-header">
        <div class="logo-box" style="width:32px; height:32px; margin:0; border-radius:6px; background-size: contain;">
        </div>
        <div>
          <h2 style="font-family:'DM Serif Display'; font-size:20px;" data-i18n="form_title">訪客登記表</h2>
        </div>
      </div>
      <div class="s2-body">
        <div class="field">
          <label data-i18n="label_name">姓名</label>
          <input type="text" id="f-name" autocomplete="off" />
        </div>
        <div class="field">
          <label data-i18n="label_email">信箱</label>
          <input type="email" id="f-email" autocomplete="off" oninput="showEmailTip()" />
          <div id="email-tip">
            請確認您的信箱是否正確
          </div>
        </div>
        <div class="field">
          <label data-i18n="label_phone">電話</label>
          <input type="tel" id="f-phone" autocomplete="off" />
        </div>
        <div class="field">
          <label data-i18n="label_purpose">來訪目的</label>
          <select id="f-purpose" onchange="checkPurpose(this.value)">
            <option value="" disabled selected data-i18n="select_placeholder">請選擇來訪目的</option>
            <option value="面試" data-i18n="opt_interview">面試</option>
            <option value="商務會議" data-i18n="opt_meeting">商務會議</option>
            <option value="廠商送貨" data-i18n="opt_delivery">廠商送貨</option>
            <option value="參訪" data-i18n="opt_visit">參訪</option>
            <option value="其他" data-i18n="opt_other">其他</option>
          </select>
        </div>
        <div class="field" id="other-purpose-wrap" style="display: none;">
          <label data-i18n="label_specific">請註明目的</label>
          <input type="text" id="f-purpose-other" autocomplete="off" />
        </div>
        <button class="submit-btn" onclick="submitForm()" data-i18n="btn_submit">下一步
        </button>
      </div>
    </div>

    <div class="screen" id="s3">
      <div class="s3-body">
        <div class="success-icon-wrap">
          <div class="success-icon">✓</div>
        </div>

        <h2 class="success-title" data-i18n="success_title">登記成功</h2>

        <div class="photo-result-container">
          <img id="photo-result" alt="Visitor Photo">
        </div>

        <p class="success-desc" data-i18n="success_desc">我們已收到您的登記，請稍候人員接待。</p>

        <button class="done-btn" onclick="location.reload()" data-i18n="btn_done">完成</button>
      </div>
    </div>
  </div>

  <script>
    const i18n = {
      zh: {
        welcome: "歡迎來到<br>RhinoShield",
        checkin: "開始登記",
        take_photo: "拍張照吧",
        take_submit: "下一步",
        form_title: "訪客登記表",
        label_name: "姓名",
        label_email: "信箱",
        label_phone: "電話",
        label_purpose: "來訪目的",
        label_specific: "請註明目的",
        select_placeholder: "請選擇來訪目的",
        opt_interview: "面試",
        opt_meeting: "商務會議",
        opt_delivery: "廠商送貨",
        opt_visit: "參訪",
        opt_other: "其他",
        btn_submit: "送出",
        success_title: "登記成功",
        success_desc: "我們已收到您的登記，請稍候人員接待。",
        btn_done: "完成",
        alert_fill: "請填寫所有欄位",
        alert_email: "請輸入正確的 Email 格式",
        alert_purpose: "請註明具體的來訪目的",
        btn_back: "返回",
        email_confirm: "請確認您的信箱是否正確"
      },
      en: {
        welcome: "Welcome to<br>RhinoShield",
        checkin: "Check In",
        take_photo: "Take a Photo",
        take_submit: "Take & Submit",
        form_title: "Visitor Form",
        label_name: "Full Name",
        label_email: "Email Address",
        label_phone: "Phone Number",
        label_purpose: "Purpose of Visit",
        label_specific: "Specific Purpose",
        select_placeholder: "Select purpose",
        opt_interview: "Interview",
        opt_meeting: "Business Meeting",
        opt_delivery: "Delivery",
        opt_visit: "Visit",
        opt_other: "Other",
        btn_submit: "Submit",
        success_title: "Successful",
        success_desc: "Registration received.",
        btn_done: "Done",
        alert_fill: "Please fill in all fields",
        alert_email: "Please enter a valid email",
        alert_purpose: "Please specify your purpose",
        btn_back: "Back to Edit",
        email_confirm: "Please confirm if your email is correct"
      },
      fr: {
        welcome: "Bienvenue chez<br>RhinoShield",
        checkin: "Enregistrer",
        take_photo: "Prendre une photo",
        take_submit: "Prendre & Envoyer",
        form_title: "Formulaire Visiteur",
        label_name: "Nom Complet",
        label_email: "Adresse Email",
        label_phone: "Téléphone",
        label_purpose: "Motif de la visite",
        label_specific: "Précisez le motif",
        select_placeholder: "Choisissez le motif",
        opt_interview: "Entretien",
        opt_meeting: "Réunion d'affaires",
        opt_delivery: "Livraison",
        opt_visit: "Visite",
        opt_other: "Autre",
        btn_submit: "Envoyer",
        success_title: "Réussi",
        success_desc: "Enregistrement reçu. Veuillez patienter.",
        btn_done: "Terminé",
        alert_fill: "Veuillez remplir tous les champs",
        alert_email: "Veuillez entrer un email valide",
        alert_purpose: "Veuillez préciser votre motif",
        btn_back: "Retour au formulaire",
        email_confirm: "Veuillez confirmer si votre e-mail est correct"
      }
    };
    function toggleMenu(event) {
      event.stopPropagation();
      const content = document.getElementById('lang-content');
      content.classList.toggle('show');
    }

    document.addEventListener('click', () => {
      document.getElementById('lang-content').classList.remove('show');
    });

    let currentLang = 'zh';

    function switchLang(lang, label) {
      currentLang = lang;
      document.getElementById('lang-current').innerText = label;
      document.body.setAttribute('data-lang', lang);

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18n[lang][key]) {
          el.innerHTML = i18n[lang][key];
        }
      });
      const content = document.getElementById('lang-content');
      content.classList.remove('show');

      document.activeElement.blur();
    }
    function go(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    let stream;
    function checkPurpose(val) {
      const otherWrap = document.getElementById('other-purpose-wrap');
      if (val === '其他') {
        otherWrap.style.display = 'block';
      } else {
        otherWrap.style.display = 'none';
      }
    }
    async function submitForm() {
      const f = (id) => document.getElementById(id).value.trim();
      const emailValue = f('f-email');
      const purposeValue = f('f-purpose');
      if (!f('f-name') || !emailValue || !f('f-phone') || !purposeValue) {
        return alert(i18n[currentLang].alert_fill);
      }
      if (purposeValue === '其他' && !f('f-purpose-other')) {
        return alert(i18n[currentLang].alert_purpose);
      }
      if (!emailValue.includes('@')) {
        return alert(i18n[currentLang].alert_email); return;
      }

      go('s-photo');

      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        document.getElementById('video').srcObject = stream;
      } catch (err) {
        alert("無法開啟相機，請檢查權限");
        go('s3');
      }
    }
    function backToForm() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      go('s2');
    }
    function showEmailTip() {
      const emailInput = document.getElementById('f-email');
      const tip = document.getElementById('email-tip');

      if (emailInput.value.length > 0) {
        tip.style.display = 'block';
      } else {
        tip.style.display = 'none';
      }
    }
    function takePhoto() {
      try {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');


        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = canvas.toDataURL('image/png');
        const resultImg = document.getElementById('photo-result');
        if (resultImg) {
          resultImg.src = imageData;
        }
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzOEgbRyERNm80Z7r9oQ9u4Q9sh9TXaVUrV1tWsDcpwZVQRpWk5HJ7X89xuypdijRp3/exec';
        const payload = {
          name: document.getElementById('f-name').value,
          email: document.getElementById('f-email').value,
          phone: document.getElementById('f-phone').value,
          purpose: document.getElementById('f-purpose').value === '其他'
            ? document.getElementById('f-purpose-other').value
            : document.getElementById('f-purpose').value
        };

        fetch(scriptURL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'text/plain'
          },
          body: JSON.stringify(payload)
        })
          .then(() => console.log('Data sent to Google Sheets'))
          .catch(err => console.error('Error:', err));
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
          stream = null;
        }

        go('s3');
      } catch (e) {
        console.error("拍照失敗:", e);
        go('s3');
      }

    }
  </script>
</body>

</html>
